<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>镜像人生 | MirrorLife</title>
    <link rel="stylesheet" href="game.css" />
  </head>
  <body>
    <div id="gameShell">
      <!-- Full-screen game canvas -->
      <canvas id="gameCanvas"></canvas>

      <!-- Top HUD bar -->
      <div class="hud-top">
        <div class="hud-brand">
          <span class="hud-logo">镜</span>
          <span class="hud-title">镜像人生</span>
        </div>
        <div class="hud-stats">
          <div class="hud-stat"><span class="hud-stat-label">回合</span><span class="hud-stat-value" id="hudTurn">0</span></div>
          <div class="hud-stat"><span class="hud-stat-label">时间</span><span class="hud-stat-value" id="hudClock">06:00</span></div>
          <div class="hud-stat"><span class="hud-stat-label">人生周</span><span class="hud-stat-value" id="hudPhase">--</span></div>
          <div class="hud-stat"><span class="hud-stat-label">活体</span><span class="hud-stat-value" id="hudAlive">0</span></div>
        </div>
        <div class="hud-scores">
          <div class="hud-score" title="自由">
            <span class="score-icon">◈</span>
            <div class="score-bar"><div class="score-fill" id="scoreFreedom" style="width:84%"></div></div>
            <span class="score-num" id="scoreFreedomNum">84</span>
          </div>
          <div class="hud-score" title="平等">
            <span class="score-icon">◆</span>
            <div class="score-bar"><div class="score-fill" id="scoreEquality" style="width:84%"></div></div>
            <span class="score-num" id="scoreEqualityNum">84</span>
          </div>
          <div class="hud-score" title="开放">
            <span class="score-icon">◇</span>
            <div class="score-bar"><div class="score-fill" id="scoreOpenness" style="width:84%"></div></div>
            <span class="score-num" id="scoreOpennessNum">84</span>
          </div>
        </div>
        <div class="hud-controls">
          <button class="hud-btn" id="hudPause" title="暂停/启动">▶</button>
          <button class="hud-btn" id="hudStep" title="推进1步">⏭</button>
          <button class="hud-btn" id="hudReset" title="重置社会">↻</button>
          <div class="speed-control">
            <label for="hudSpeed">速度</label>
            <input type="range" id="hudSpeed" min="0.5" max="3" step="0.5" value="0.5" />
            <span id="hudSpeedVal">0.5x</span>
          </div>
        </div>
      </div>

      <!-- Bottom HUD bar -->
      <div class="hud-bottom">
        <div class="hud-actions">
          <button class="action-btn" data-soc-action="propose"><span class="action-icon">📢</span>发起提案</button>
          <button class="action-btn" data-soc-action="cooperate"><span class="action-icon">🤝</span>协作行动</button>
          <button class="action-btn" data-soc-action="support"><span class="action-icon">💛</span>支持回应</button>
          <button class="action-btn" data-soc-action="listen"><span class="action-icon">👂</span>倾听回应</button>
          <button class="action-btn" data-soc-action="meditate"><span class="action-icon">☮</span>协调修复</button>
        </div>
      </div>

      <!-- Left game menu -->
      <div class="game-menu">
        <button class="menu-btn" data-modal="mirror" title="镜像舱">◐</button>
        <button class="menu-btn" data-modal="script" title="人生剧本">▦</button>
        <button class="menu-btn" data-modal="exchange" title="交换人生">⇄</button>
        <button class="menu-btn" data-modal="bottle" title="漂流回声">✦</button>
        <button class="menu-btn" data-modal="robot" title="回家模式">⌂</button>
        <button class="menu-btn" data-modal="echoes" title="回声档案">☰</button>
        <button class="menu-btn" data-modal="missions" title="社会任务">★</button>
        <button class="menu-btn" data-modal="citizens" title="市民看板">◉</button>
        <button class="menu-btn" data-modal="safety" title="安全治理">🛡</button>
      </div>

      <!-- Event toast area -->
      <div class="event-toasts" id="eventToasts"></div>

      <!-- Scenario input bar -->
      <div class="scenario-bar" id="scenarioBar">
        <input type="text" id="scenarioInput" placeholder="用一句话设定剧情场景..." />
        <button class="scenario-btn" id="scenarioSubmit">生成</button>
        <div class="scene-presets">
          <button class="preset-chip" data-scene="open-square">开放广场</button>
          <button class="preset-chip" data-scene="study-hub">共学市集</button>
          <button class="preset-chip" data-scene="respite">修复之夜</button>
          <button class="preset-chip" data-scene="homefront">家庭庭院</button>
        </div>
      </div>

      <!-- First-session quest stage -->
      <section class="first-loop-panel quest-stage" id="firstLoopPanel" aria-label="MirrorLife 首轮任务">
        <div id="questStageContent" aria-live="polite"></div>
      </section>

      <!-- Event log sidebar -->
      <div class="event-log" id="eventLog">
        <div class="event-log-header">
          <span class="event-log-title">世界脉冲</span>
          <button class="event-log-toggle" id="eventLogToggle" title="收起">◀</button>
        </div>
        <div class="event-log-summary" id="worldPulseSummary"></div>
        <div class="event-log-body" id="eventLogBody"></div>
      </div>

      <!-- Detail panel (for clicked zone/citizen) -->
      <div class="detail-panel" id="detailPanel">
        <button class="detail-close" id="detailClose">×</button>
        <div class="detail-content" id="detailContent"></div>
      </div>

      <!-- Modal overlay for features -->
      <div class="modal-overlay" id="modalOverlay">
        <div class="modal-panel" id="modalPanel">
          <button class="modal-close" id="modalClose">×</button>
          <div class="modal-content" id="modalContent"></div>
        </div>
      </div>

      <!-- Tutorial overlay for new users -->
      <div class="tutorial-overlay" id="tutorialOverlay">
        <div class="tutorial-backdrop"></div>
        <div class="tutorial-spotlight" id="tutorialSpotlight"></div>
        <div class="tutorial-card" id="tutorialCard">
          <div class="tutorial-step-dots" id="tutorialDots"></div>
          <h2 class="tutorial-title" id="tutorialTitle"></h2>
          <p class="tutorial-desc" id="tutorialDesc"></p>
          <div class="tutorial-actions">
            <button class="tutorial-skip" id="tutorialSkip">跳过引导</button>
            <button class="tutorial-next" id="tutorialNext">下一步</button>
          </div>
        </div>
      </div>

      <!-- Avatar creation / splash screen -->
      <div class="splash-screen" id="splashScreen">
        <div class="splash-inner">
          <section class="splash-story">
            <div class="splash-logo">镜</div>
            <p class="splash-kicker">MirrorLife / 镜像人生</p>
            <h1>你想活出怎样的人生</h1>
            <p class="splash-lead">进入一段匿名重构的人生，在镜像社区里经历计划、联系、行动、复盘和成长，让另一个世界把回声轻轻传回来。</p>
            <div class="journey-preview" aria-label="核心玩法">
              <div class="journey-step">
                <b>1</b>
                <span>试活人生</span>
                <small>切换身份，体验匿名重构的人生岔路。</small>
              </div>
              <div class="journey-step">
                <b>2</b>
                <span>情感机器人</span>
                <small>现实中的信使接住虚拟社会的回声。</small>
              </div>
              <div class="journey-step">
                <b>3</b>
                <span>灵魂漂流瓶</span>
                <small>在某个转折点，遇见同频的人。</small>
              </div>
            </div>
            <div class="splash-world-strip" aria-hidden="true">
              <span>现实中的你</span>
              <i></i>
              <span>情感机器人</span>
              <i></i>
              <span>虚拟社会分身</span>
            </div>
          </section>
          <section class="splash-creator" aria-label="镜像身份牌">
            <canvas id="avatarPreviewCanvas" width="120" height="120" class="avatar-preview-canvas"></canvas>
            <div class="mirror-tag-card">
              <p>镜像身份牌</p>
              <strong id="mirrorTagName">你的分身</strong>
              <span>用于进入第一段人生胶囊，稍后可以继续调整。</span>
            </div>
            <details class="avatar-details">
              <summary>调整身份牌</summary>
              <div class="avatar-form">
                <label class="avatar-label" for="avatarName">姓名</label>
                <input type="text" id="avatarName" class="avatar-input" placeholder="给你的分身取个名字" maxlength="12" />
                <label class="avatar-label" for="avatarAge">年龄: <span id="avatarAgeVal">24</span></label>
                <input type="range" id="avatarAge" class="avatar-range" min="5" max="80" value="24" />
                <label class="avatar-label" for="avatarProfession">职业</label>
                <select id="avatarProfession" class="avatar-profession-select"></select>
                <label class="avatar-label">外观颜色</label>
                <div class="avatar-color-grid" id="avatarColorGrid"></div>
                <label class="avatar-label" for="avatarBio">一句话自我介绍</label>
                <input type="text" id="avatarBio" class="avatar-input" placeholder="例如：想试着活得更勇敢" maxlength="40" />
              </div>
            </details>
            <button class="splash-enter" id="splashEnter">开始试活</button>
            <p class="splash-footnote">先进入一段人生，做一次选择，再听见另一个我的信号。</p>
          </section>
        </div>
      </div>
    </div>

    <script>window.__errs = []; window.addEventListener('error', e => window.__errs.push(e.message + ' @ ' + e.filename + ':' + e.lineno));</script>
    <script type="module" src="./analytics-entry.js"></script>
    <script src="engine.js"></script>
    <script src="narrative.js"></script>
    <script src="causal-graph.js"></script>
    <script src="game.js"></script>
  </body>
</html>
